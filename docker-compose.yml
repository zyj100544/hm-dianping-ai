services:
  # ===================== 基础设施 =====================

  mysql:
    image: mysql:5.7
    container_name: hm-mysql
    command: --sql-mode="NO_ENGINE_SUBSTITUTION"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_DATABASE: hmdp
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./hm-dianping/src/main/resources/db/hmdp.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./hm-dianping/src/main/resources/db/migration.sql:/docker-entrypoint-initdb.d/02-migration.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6-alpine
    container_name: hm-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hm-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-hmall}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/hmall}
    ports:
      - "15672:5672"
      - "25672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===================== 应用服务 =====================

  hm-dianping:
    build:
      context: ./hm-dianping
      dockerfile: Dockerfile
    container_name: hm-backend
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-hmall}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/hmall}
      AI_SEARCH_URL: http://hm-dianping-ai-web:8000/api/semantic-search
      AI_BLOG_ASSIST_URL: http://hm-dianping-ai-web:8000/api/blog-assist
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET:-}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME:-heima-dianping-ai}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  hm-dianping-web:
    build:
      context: ./hm-dianping-web
      dockerfile: Dockerfile
    container_name: hm-frontend
    ports:
      - "80:80"
    depends_on:
      - hm-dianping

  hm-dianping-ai-web:
    build:
      context: ./hm-dianping-ai-agent
      dockerfile: Dockerfile
    container_name: hm-ai-web
    command: ["python", "-m", "uvicorn", "web_server:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-hmall}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/hmall}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    depends_on:
      rabbitmq:
        condition: service_healthy

  hm-dianping-ai-consumer:
    build:
      context: ./hm-dianping-ai-agent
      dockerfile: Dockerfile
    container_name: hm-ai-consumer
    command: ["python", "main.py"]
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-hmall}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/hmall}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
